databases:
  - name: statstream-db
    databaseName: statstream_db
    user: statstream
    plan: free

services:
  - type: web
    name: statstream-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: statstream-db
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: web
    name: statstream-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        value: https://dlzupeheohnylpqkisbw.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        value: sb_publishable_9spTnWhoLCCHZ7P8YgLfnA_BnIM9QoI
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
